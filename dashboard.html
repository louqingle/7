<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学生个人中心</title>
<style>
body{
    margin:0;
    font-family:"Microsoft YaHei";
    background:#f5f7fb;
}
header{
    background:#0057b8;
    color:white;
    padding:20px;
    text-align:center;
}
.container{
    width:95%;
    max-width:1100px;
    margin:20px auto;
}
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}
.card{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
}
.card h3{
    color:#0057b8;
}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}
table th,table td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}
button{
    padding:10px 18px;
    background:#0057b8;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>
<body>

<header>
    <h1>许昌科技学校学生个人中心</h1>
</header>

<div class="container">

    <div class="grid">
        <div class="card">
            <h3>👤 学生信息</h3>
            <p>姓名：张同学</p>
            <p>班级：23计算机1班</p>
            <p>学号：2026001</p>
        </div>

        <div class="card">
            <h3>📊 本学期成绩</h3>
            <p>语文：86</p>
            <p>数学：92</p>
            <p>英语：88</p>
        </div>

        <div class="card">
            <h3>📢 最新通知</h3>
            <p>7月20日技能竞赛报名截止</p>
            <p>图书馆开放至21:00</p>
        </div>

        <div class="card">
            <h3>⚡ 快捷功能</h3>
            <p><a href="leave.html">在线请假</a></p>
            <p><a href="repair.html">宿舍报修</a></p>
        </div>
    </div>

    <div class="card" style="margin-top:20px;">
        <h3>📅 本周课程表</h3>
        <table>
            <tr>
                <th>节次</th>
                <th>周一</th>
                <th>周二</th>
                <th>周三</th>
                <th>周四</th>
                <th>周五</th>
            </tr>
            <tr>
                <td>1-2</td>
                <td>语文</td>
                <td>数学</td>
                <td>英语</td>
                <td>计算机</td>
                <td>体育</td>
            </tr>
            <tr>
                <td>3-4</td>
                <td>计算机</td>
                <td>英语</td>
                <td>数学</td>
                <td>语文</td>
                <td>机电</td>
            </tr>
        </table>
    </div>

</div>

</body>
</html>
